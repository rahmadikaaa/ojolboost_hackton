# ============================================================
# OjolBoost MAMS — Google Cloud Build Pipeline
# ============================================================
# Pipeline 3 Step:
#   Step 1 (build)  : Build Docker image
#   Step 2 (push)   : Push ke Artifact Registry
#   Step 3 (deploy) : Deploy ke Cloud Run
#
# Trigger: Push ke branch 'main' di Cloud Source Repositories / GitHub.
#
# Substitutions (isi via Cloud Build trigger settings atau --substitutions flag):
#   _REGION         : GCP region (default: asia-southeast1)
#   _SERVICE_NAME   : Nama Cloud Run service
#   _AR_REPO        : Nama Artifact Registry repository
#
# Cara menjalankan manual:
#   gcloud builds submit \
#     --config deploy/cloudbuild.yaml \
#     --substitutions _REGION=asia-southeast1,_SERVICE_NAME=ojolboost-mams,_AR_REPO=ojolboost-images \
#     .
# ============================================================

substitutions:
  _REGION: "asia-southeast1"
  _SERVICE_NAME: "ojolboost-mams"
  _AR_REPO: "ojolboost-images"

# Image yang dibangun — menggunakan commit SHA untuk immutability & traceability
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"

steps:

  # ──────────────────────────────────────────────────────────
  # STEP 1: BUILD — Membangun Docker image
  # ──────────────────────────────────────────────────────────
  - id: "build"
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      # Target stage runtime saja (skip builder stage artifacts)
      - --target
      - runtime
      # Cache dari image 'latest' di registry untuk mempercepat build
      - --cache-from
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"
      # Tag dengan commit SHA (immutable) dan 'latest' (untuk cache)
      - --tag
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --tag
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"
      # Build args untuk metadata image
      - --build-arg
      - "BUILDKIT_INLINE_CACHE=1"
      # Path ke Dockerfile (relatif dari root workspace)
      - --file
      - "deploy/Dockerfile"
      # Build context = root project (agar COPY agents/ dll dapat diakses)
      - "."
    env:
      - "DOCKER_BUILDKIT=1"

  # ──────────────────────────────────────────────────────────
  # STEP 2: PUSH — Mendorong image ke Artifact Registry
  # Push dilakukan secara eksplisit untuk kejelasan pipeline.
  # ──────────────────────────────────────────────────────────
  - id: "push-sha"
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
    waitFor: ["build"]

  - id: "push-latest"
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:latest"
    waitFor: ["build"]

  # ──────────────────────────────────────────────────────────
  # STEP 3: DEPLOY — Deploy ke Cloud Run
  #
  # Flag penting:
  #   --allow-unauthenticated : API diakses oleh driver/frontend
  #   --concurrency 80        : Sesuai service.yaml (agent workload)
  #   --cpu 1                 : 1 vCPU cukup untuk MCP Server
  #   --memory 512Mi          : Cukup untuk multi-agent orchestration
  #   --min-instances 0       : Scale to zero saat tidak ada traffic
  #   --max-instances 10      : Batas scale-up untuk kontrol biaya
  #   --timeout 120           : Toleransi latency Vertex AI
  #
  # Secrets di-inject via Secret Manager — BUKAN env vars hardcode.
  # ──────────────────────────────────────────────────────────
  - id: "deploy"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${SHORT_SHA}"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      # Akses publik untuk driver/frontend API calls
      - --allow-unauthenticated
      # Runtime configuration
      - --concurrency
      - "80"
      - --cpu
      - "1"
      - --memory
      - "512Mi"
      - --min-instances
      - "0"
      - --max-instances
      - "10"
      - --timeout
      - "120"
      # Environment variables NON-SENSITIVE (nilai hardcode aman)
      - --set-env-vars
      - >-
        GOOGLE_CLOUD_PROJECT=${PROJECT_ID},
        VERTEX_AI_LOCATION=${_REGION},
        BIGQUERY_DATASET=ojolboosttrack2,
        BIGQUERY_LOCATION=${_REGION},
        MCP_SERVER_PORT=8080,
        LOG_LEVEL=INFO,
        LOG_FORMAT=json
      # Secrets dari Secret Manager (JANGAN hardcode API key di sini)
      # Format: ENV_VAR_NAME=secret-name:version
      - --set-secrets
      - >-
        OPENWEATHER_API_KEY=ojolboost-openweather-api-key:latest,
        GOOGLE_KEEP_TOKEN=ojolboost-google-keep-token:latest,
        GEMINI_MODEL=ojolboost-gemini-model:latest
      # Service account dengan IAM permissions minimal
      - --service-account
      - "ojolboost-mams-sa@${PROJECT_ID}.iam.gserviceaccount.com"
      # Ingress: all (terima traffic dari internet untuk driver/frontend)
      - --ingress
      - all
    waitFor: ["push-sha"]

# ──────────────────────────────────────────────────────────
# OPSI BUILD
# ──────────────────────────────────────────────────────────
options:
  # Gunakan machine type yang lebih cepat untuk mempercepat build Docker
  machineType: "E2_HIGHCPU_8"
  # Log ke Cloud Logging agar bisa dimonitor via Cloud Console
  logging: CLOUD_LOGGING_ONLY
  # Aktifkan substitution checking (tangkap typo di substitutions)
  substitutionOption: "ALLOW_LOOSE"
  # Dynamic substitutions (memungkinkan nested substitutions)
  dynamicSubstitutions: true

# ──────────────────────────────────────────────────────────
# TIMEOUT BUILD
# Total pipeline tidak boleh melebihi 20 menit.
# (Build ~5m + Push ~2m + Deploy ~3m = ~10m nominal)
# ──────────────────────────────────────────────────────────
timeout: "1200s"
